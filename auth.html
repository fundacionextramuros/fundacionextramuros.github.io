<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticación - Galería de Arte - Fundación Extramuros</title>
    <meta name="description" content="Inicia sesión o regístrate en la galería de arte de la Fundación Extramuros">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/notificaciones.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <!-- Contenedor de notificaciones -->
    <div id="notification-container" class="notification-container"></div>

    <div class="auth-container">
        <!-- LOGIN SECTION -->
        <div id="login-section" class="auth-section">
            <img src="iconos/Logo-temporal.svg" alt="Hagamos Arte Táchira - Fundación Extramuros" class="auth-logo">
            <h1>Iniciar Sesión</h1>
            <form id="login-form">
                <label for="login-email" class="visually-hidden">Email</label>
                <input type="email" id="login-email" placeholder="Email" required autocomplete="email">
                <label for="login-pass" class="visually-hidden">Contraseña</label>
                <input type="password" id="login-pass" placeholder="Contraseña" required autocomplete="current-password">
                <p class="forgot-password">
                    <a href="reset-password.html" id="btn-olvide-contrasena">¿Olvidaste tu contraseña?</a>
                </p>
                <button type="submit">Entrar</button>
            </form>
            <button id="btn-ir-registro" class="secondary-btn">Registrarse</button>
        </div>

        <!-- REGISTRO SECTION -->
        <div id="registro-section" class="auth-section hidden">
            <h1>Registro de Artista</h1>
            <form id="registro-form" class="compact-form">

                <div class="step" data-step="1">
                    <h2 class="visually-hidden">Paso 1: Información personal</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="reg-nombres">Nombres</label>
                            <input type="text" id="reg-nombres" placeholder="Ej: Edgar Antonio" required autocomplete="given-name">
                        </div>
                        <div class="form-group">
                            <label for="reg-apellidos">Apellidos</label>
                            <input type="text" id="reg-apellidos" placeholder="Ej: Fernández Pérez" required autocomplete="family-name">
                        </div>
                    </div>
                    <div class="step-navigation">
                        <button type="button" class="nav-btn prev-btn" data-step="1">Atrás</button>
                        <button type="button" class="nav-btn next-btn" data-step="1">Siguiente</button>
                    </div>
                </div>

                <div class="step" data-step="2" style="display:none;">
                    <h2 class="visually-hidden">Paso 2: Fecha de nacimiento y género</h2>
                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <div class="date-group">
                            <label for="reg-dia" class="visually-hidden">Día</label>
                            <select name="dia" id="reg-dia" required>
                                <option value="" disabled selected>Día</option>
                            </select>
                            <label for="reg-mes" class="visually-hidden">Mes</label>
                            <select name="mes" id="reg-mes" required>
                                <option value="" disabled selected>Mes</option>
                            </select>
                            <label for="reg-ano" class="visually-hidden">Año</label>
                            <select name="ano" id="reg-ano" required>
                                <option value="" disabled selected>Año</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="reg-genero">Género</label>
                        <select id="reg-genero" required>
                            <option value="" disabled selected>Selecciona Género</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                    <div class="step-navigation">
                        <button type="button" class="nav-btn prev-btn" data-step="2">Atrás</button>
                        <button type="button" class="nav-btn next-btn" data-step="2">Siguiente</button>
                    </div>
                </div>

                <div class="step" data-step="3" style="display:none;">
                    <h2 class="visually-hidden">Paso 3: Ubicación</h2>
                    <div class="form-group">
                        <label for="reg-pais">País de Residencia</label>
                        <select id="reg-pais" required>
                            <option value="" disabled selected>Selecciona tu país</option>
                            <option value="Venezuela">Venezuela</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reg-ciudad">Ciudad</label>
                        <select id="reg-ciudad" required>
                            <option value="" disabled selected>Selecciona tu ciudad</option>
                        </select>
                    </div>
                    <div class="step-navigation">
                        <button type="button" class="nav-btn prev-btn" data-step="3">Atrás</button>
                        <button type="button" class="nav-btn next-btn" data-step="3">Siguiente</button>
                    </div>
                </div>

                <div class="step" data-step="4" style="display:none;">
                    <h2 class="visually-hidden">Paso 4: Contacto</h2>
                    <div class="form-group">
                        <label for="reg-email">Correo Electrónico</label>
                        <input type="email" id="reg-email" placeholder="Ej: ejemplo@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-telefono">Número de celular</label>
                        <input type="text" id="reg-telefono" placeholder="Ej: 04161234567" required>
                    </div>
                    <div class="step-navigation">
                        <button type="button" class="nav-btn prev-btn" data-step="4">Atrás</button>
                        <button type="button" class="nav-btn next-btn" data-step="4">Siguiente</button>
                    </div>
                </div>

                <div class="step" data-step="5" style="display:none;">
                    <h2 class="visually-hidden">Paso 5: Credenciales</h2>
                    <div class="form-group">
                        <label for="reg-nombre-artista">Nombre de Usuario</label>
                        <input type="text" id="reg-nombre-artista" placeholder="Ej: Edgarafarez" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-pass">Contraseña</label>
                        <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <div class="step-navigation">
                        <button type="button" class="nav-btn prev-btn" data-step="5">Atrás</button>
                        <button type="submit" id="btn-registrarse-final">Enviar</button>
                    </div>
                </div>

            </form>
        </div>
    </div>

    <script src="js/notificaciones.js" type="module"></script>
    <script type="module" src="js/auth-logic.js"></script>
</body>
</html>
