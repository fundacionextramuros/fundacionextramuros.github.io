<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Galería de Arte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/notificaciones.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-section">
            <h1>Restablecer Contraseña</h1>

            <form id="reset-password-form">
                <div class="form-group">
                    <label for="nueva-password">Nueva contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="nueva-password" placeholder="Nueva contraseña" required autocomplete="new-password">
                        <button type="button" class="toggle-password" data-target="nueva-password" aria-label="Mostrar contraseña"></button>
                    </div>
                    <div id="password-strength" class="password-strength" aria-live="polite">
                        <div class="strength-bar"><span class="strength-bar-fill"></span></div>
                        <span class="strength-label"></span>
                    </div>
                    <ul id="password-requirements" class="password-requirements">
                        <li data-req="length">Mínimo 8 caracteres</li>
                        <li data-req="lower">Letra minúscula</li>
                        <li data-req="upper">Letra mayúscula</li>
                        <li data-req="number">Un número</li>
                        <li data-req="special">Un símbolo</li>
                    </ul>
                </div>

                <div class="form-group">
                    <label for="confirmar-password">Confirmar contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmar-password" placeholder="Repite la contraseña" required autocomplete="new-password">
                        <button type="button" class="toggle-password" data-target="confirmar-password" aria-label="Mostrar contraseña"></button>
                    </div>
                    <div id="confirm-msg" class="error-message-field"></div>
                </div>

                <button type="submit" id="btn-reset">Cambiar contraseña</button>
            </form>

            <div style="text-align:center; margin-top:16px;">
                <a href="auth.html" style="font-size:13px; color:var(--color-ink); text-decoration:none; font-weight:500;">
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>

    <script>
        const NIVEL_MIN_PASSWORD = 3;

        function evaluarRequisitos(password) {
            return {
                length:  password.length >= 8,
                lower:   /[a-z]/.test(password),
                upper:   /[A-Z]/.test(password),
                number:  /\d/.test(password),
                special: /[^A-Za-z0-9]/.test(password)
            };
        }

        function calcularFortaleza(password) {
            if (!password) return { nivel: 0, etiqueta: '', requisitos: evaluarRequisitos('') };
            const req = evaluarRequisitos(password);
            let puntos = Object.values(req).filter(Boolean).length;
            if (password.length >= 12) puntos++;
            let nivel;
            if (puntos <= 2) nivel = 1;
            else if (puntos === 3) nivel = 2;
            else if (puntos === 4) nivel = 3;
            else nivel = 4;
            if (!req.length) nivel = 1;
            const etiquetas = { 1: 'Débil', 2: 'Media', 3: 'Buena', 4: 'Fuerte' };
            return { nivel, etiqueta: etiquetas[nivel], requisitos: req };
        }

        function actualizarMedidor(password) {
            const strengthEl = document.getElementById('password-strength');
            const requirementsEl = document.getElementById('password-requirements');
            if (!strengthEl || !requirementsEl) return;
            const labelEl = strengthEl.querySelector('.strength-label');
            const { nivel, etiqueta, requisitos } = calcularFortaleza(password);
            if (!password) {
                strengthEl.classList.remove('active');
                requirementsEl.classList.remove('active');
                strengthEl.removeAttribute('data-level');
                if (labelEl) labelEl.textContent = '';
            } else {
                strengthEl.classList.add('active');
                requirementsEl.classList.add('active');
                strengthEl.setAttribute('data-level', nivel);
                if (labelEl) labelEl.textContent = etiqueta;
            }
            requirementsEl.querySelectorAll('li').forEach(li => {
                li.classList.toggle('met', !!requisitos[li.dataset.req]);
            });
        }

        // Toggle mostrar/ocultar contraseña
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function () {
                const input = document.getElementById(this.dataset.target);
                if (!input) return;
                const isPass = input.type === 'password';
                input.type = isPass ? 'text' : 'password';
                this.classList.toggle('visible', isPass);
                this.setAttribute('aria-label', isPass ? 'Ocultar contraseña' : 'Mostrar contraseña');
            });
        });

        // Medidor en tiempo real
        document.getElementById('nueva-password').addEventListener('input', function () {
            actualizarMedidor(this.value);
            document.getElementById('confirm-msg').style.display = 'none';
        });

        document.getElementById('confirmar-password').addEventListener('input', function () {
            const nueva = document.getElementById('nueva-password').value;
            const confirmMsg = document.getElementById('confirm-msg');
            if (this.value && this.value !== nueva) {
                confirmMsg.textContent = 'Las contraseñas no coinciden.';
                confirmMsg.style.display = 'block';
            } else {
                confirmMsg.style.display = 'none';
            }
        });

        // Token desde la URL
        const pathParts = window.location.pathname.split('/');
        const token = pathParts[pathParts.length - 1] || '';

        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nuevaPassword = document.getElementById('nueva-password').value;
            const confirmarPassword = document.getElementById('confirmar-password').value;
            const confirmMsg = document.getElementById('confirm-msg');
            const btn = document.getElementById('btn-reset');

            if (nuevaPassword !== confirmarPassword) {
                confirmMsg.textContent = 'Las contraseñas no coinciden.';
                confirmMsg.style.display = 'block';
                return;
            }

            const { nivel } = calcularFortaleza(nuevaPassword);
            if (nivel < NIVEL_MIN_PASSWORD) {
                confirmMsg.textContent = 'La contraseña es muy débil. Usa mayúsculas, minúsculas, números y símbolos.';
                confirmMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Cambiando...';

            try {
                const res = await fetch('https://backend-fundacion-atpe.onrender.com/api/artistas/confirmar-restablecimiento', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, nueva_password: nuevaPassword })
                });
                const data = await res.json();
                if (data.success) {
                    btn.textContent = 'Contraseña cambiada';
                    confirmMsg.textContent = 'Contraseña restablecida correctamente. Redirigiendo...';
                    confirmMsg.style.color = 'var(--color-success)';
                    confirmMsg.style.display = 'block';
                    setTimeout(() => { window.location.href = '/auth.html'; }, 2500);
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Cambiar contraseña';
                    confirmMsg.textContent = data.error || 'Ocurrió un error. Inténtalo de nuevo.';
                    confirmMsg.style.color = 'var(--color-danger)';
                    confirmMsg.style.display = 'block';
                }
            } catch (error) {
                btn.disabled = false;
                btn.textContent = 'Cambiar contraseña';
                confirmMsg.textContent = 'Error de conexión. Inténtalo más tarde.';
                confirmMsg.style.color = 'var(--color-danger)';
                confirmMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
