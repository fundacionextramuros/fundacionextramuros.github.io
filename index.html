<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Arte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header id="main-header">
        <h1 id="brand-name">Galería de Arte</h1>
        <div id="user-actions">
            <button id="btn-perfil">👤</button>
            <button id="btn-logout" class="hidden">🚪 Cerrar Sesión</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <!-- SECCIÓN PÚBLICA: GALERÍA -->
        <section id="galeria-publica">
            <div id="galeria-container">
                <!-- Las tarjetas de obras se cargarán aquí -->
                <p>Cargando galería...</p>
            </div>
        </section>
        <!-- 🆕 NUEVO BOTÓN PARA VOLVER A LA GALERÍA -->
        <button id="btn-volver-galeria" class="btn-volver hidden">← Volver a la Galería</button>
        <!-- SECCIÓN PRIVADA: PANEL DEL ARTISTA -->
        <section id="panel-artista" class="hidden">
            <h2>Mi Panel</h2>
            <!-- Tabla de obras -->
            <div id="tabla-obras-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Precio</th>
                            <th>Imagen</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-obras-body">
                        <!-- Filas de obras -->
                    </tbody>
                </table>
            </div>
            <!-- Formulario para agregar/editar obra -->
            <div id="formulario-obra">
                <h3>Agregar / Editar Obra</h3>
                <form id="obra-form">
                    <!-- Datos básicos -->
                    <input type="text" id="input-titulo" placeholder="Título" required>
                    <input type="text" id="input-artista" placeholder="Artista" readonly>
                    <input type="number" id="input-precio" placeholder="Precio" required>
                    <input type="text" id="input-id-personalizado" placeholder="ID Personalizado (ej: 1440001)">

                    <!-- Detalles -->
                    <input type="number" id="input-ano" placeholder="Año">
                    <textarea id="input-descripcion-tecnica" placeholder="Descripción Técnica"></textarea>
                    <textarea id="input-descripcion-artistica" placeholder="Descripción Artística"></textarea>

                    <!-- Estado y Otros -->
                    <select id="input-estado-obra">
                        <option value="">Estado de la Obra</option>
                        <option value="Disponible">Disponible</option>
                        <option value="Vendida">Vendida</option>
                        <option value="Reservada">Reservada</option>
                        <option value="No disponible">No disponible</option>
                    </select>
                    <input type="text" id="input-procedencia" placeholder="Procedencia">
                    <input type="text" id="input-marcos" placeholder="Marcos">
                    <input type="text" id="input-certificado" placeholder="Certificado">
                    <input type="text" id="input-status" placeholder="Status">
        
                    <!-- Dimensiones y Especificaciones -->
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="input-ancho" placeholder="Ancho (cm)" style="flex: 1;">
                        <input type="number" id="input-alto" placeholder="Alto (cm)" style="flex: 1;">
                    </div>
                    <input type="text" id="input-firma" placeholder="Firma">
                    <input type="text" id="input-conservacion" placeholder="Conservación">
                    <input type="text" id="input-etiquetas" placeholder="Etiquetas (separadas por coma)">
                    <input type="text" id="input-localizacion" placeholder="Localización">

                    <!-- Múltiples Imágenes (Tu backend ya soporta 5 imágenes) -->
                    <label>Imagen Principal:</label>
                    <input type="file" id="input-imagen-0" accept="image/*">
                    <label>Imagen 2 (opcional):</label>
                    <input type="file" id="input-imagen-1" accept="image/*">
                    <label>Imagen 3 (opcional):</label>
                    <input type="file" id="input-imagen-2" accept="image/*">
                    <label>Imagen 4 (opcional):</label>
                    <input type="file" id="input-imagen-3" accept="image/*">
                    <label>Imagen 5 (opcional):</label>
                    <input type="file" id="input-imagen-4" accept="image/*">

                    <input type="hidden" id="input-id-edicion">
                    <button type="submit" id="btn-guardar">Guardar Obra</button>
                    <button type="button" id="btn-cancelar" class="hidden">Cancelar Edición</button>
                </form>
            </div>
        </section>
    </main>

    <!-- MODALES -->
    <div id="modal-login" class="modal hidden">
        
        <div class="modal-content">
            <span class="cerrar-modal" style="float:right; cursor:pointer; font-size:20px;">&times;</span>
            <h2>Iniciar Sesión</h2>
            <form id="login-form">
                
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-pass" placeholder="Contraseña" required>
                <button type="submit">Entrar</button>
            </form>
            <button id="btn-ir-registro">Registrarse</button>
        </div>
    </div>

    <div id="modal-registro" class="modal hidden">
        <div class="modal-content">
            <span class="cerrar-modal" style="float:right; cursor:pointer; font-size:20px;">&times;</span>
            <h2>Registro de Artista</h2>
            <form id="registro-form">
                <input type="text" id="reg-nombre-real" placeholder="Nombre Completo">
                <input type="text" id="reg-nombre-artista" placeholder="Nombre de Usuario" required>
                <input type="email" id="reg-email" placeholder="Correo Electronico" required>
                <input type="password" id="reg-pass" placeholder="Contraseña" required>
                <input type="text" id="reg-telefono" placeholder="Móvil">
                <input type="text" id="reg-pais" placeholder="País de Residencia">
                <input type="text" id="reg-ciudad" placeholder="Ciudad">
                <input type="text" id="reg-instagram" placeholder="Usuario en Instagram">
                <input type="date" id="reg-fecha-nacimiento" placeholder="Fecha de Nacimiento">
    
                <select id="reg-genero">
                    <option value="">Selecciona Género</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Otro">Otro</option>
                    <option value="Prefiero no decirlo">Prefiero no decirlo</option>
                </select>
                <button type="submit">Registrarse</button>
            </form>
            <button id="btn-ir-login">Volver al Login</button>
        </div>
    </div>

    <div id="modal-detalles" class="modal hidden">
        <div class="modal-content">
            <h2 id="detalle-titulo"></h2>
            <p id="detalle-artista"></p>
            <p id="detalle-precio"></p>
            <img id="detalle-imagen" src="" alt="">
            <button id="btn-cerrar-detalles">Cerrar</button>
        </div>
    </div>

    <!-- JS PRINCIPAL (type="module") -->
    <script src="js/main.js" type="module"></script>
</body>
</html>
